version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=${MONGO_URI:-mongodb://db:27017}
      - MONGO_DB_NAME=${MONGO_DB_NAME:-investmind}
      - SERVER_ENCRYPTION_PASSPHRASE=${SERVER_ENCRYPTION_PASSPHRASE:-investmind-secret-passphrase}
    depends_on:
      - db

  db:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
